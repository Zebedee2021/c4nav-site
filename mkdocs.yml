site_name: C4Nav - 无人艇自主导航
site_url: https://zebedee2021.github.io/c4nav-site/
site_description: C4 无人艇自主导航研究平台 - 技术文档
repo_url: https://github.com/Zebedee2021/c4nav-site
repo_name: Zebedee2021/c4nav-site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换为深色模式
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换为浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - 首页: index.md
  - 平台:
    - platform/index.md
    - 架构设计: platform/architecture.md
    - SpaceR-USV: platform/spacer-usv.md
  - 仿真环境:
    - environment/index.md
    - 竞赛规则到 MDP 映射: environment/mdp-mapping.md
    - 动力学模型: environment/dynamics.md
    - 奖励函数: environment/reward.md
  - 算法:
    - algorithms/index.md
    - DQN 系列: algorithms/dqn-family.md
    - PPO 扩展: algorithms/ppo-extension.md
    - 模型与推理: algorithms/model-inference.md
  - 研究方向:
    - research/index.md
    - 物理信息强化学习: research/pirl.md
    - 仿真迁移框架: research/transfer.md
    - 研究路线图: research/roadmap.md
    - 具身空间理论: research/embodied-space.md
  - 使用指南:
    - guides/index.md
    - 快速开始: guides/quickstart.md
    - GPU 配置: guides/gpu-setup.md
    - 参数配置: guides/config.md
    - 云端训练: guides/cloud-training.md
    - 训练结果解读: guides/understanding-results.md
    - 论文写作指南: guides/paper-writing.md
  - 参考资料:
    - references/index.md
    - 相关论文: references/papers.md
    - 术语表: references/glossary.md

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Zebedee2021
